<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
  <title>Xray Panel</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="logo">X</div>
        <h1>Xray Panel</h1>
      </div>
      <div class="header-right">
        <div class="status-dot" id="statusDot"></div>
        <span class="ws-badge ws-disconnected" id="wsBadge">WS</span>
        <span class="updated-time" id="updatedTime">--</span>
        <button class="btn" onclick="fetchData()">刷新</button>
        <a href="/admin/panel" class="btn" style="text-decoration:none;">管理</a>
      </div>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card card">
        <div class="label">总上行</div>
        <div class="value" id="totalUp">--</div>
      </div>
      <div class="stat-card card">
        <div class="label">总下行</div>
        <div class="value" id="totalDown">--</div>
      </div>
      <div class="stat-card card">
        <div class="label">总流量</div>
        <div class="value" id="totalAll">--</div>
      </div>
      <div class="stat-card card">
        <div class="label">运行时间</div>
        <div class="value" id="uptime">--</div>
      </div>
      <div class="stat-card card">
        <div class="label">↑ 实时速率</div>
        <div class="value speed-value" id="speedUp">--</div>
      </div>
      <div class="stat-card card">
        <div class="label">↓ 实时速率</div>
        <div class="value speed-value" id="speedDown">--</div>
      </div>
    </div>

    <!-- Traffic Chart -->
    <div class="card full-width" style="margin-bottom:24px">
      <div class="card-header">
        <h2>带宽趋势</h2>
      </div>
      <div class="card-body">
        <div class="chart-container" style="width: 100%; height: 220px; position: relative;">
          <canvas class="chart-canvas" id="trafficChart" style="width: 100%; height: 100%;"></canvas>
        </div>
      </div>
    </div>

    <div class="main-grid">
      <!-- Users -->
      <div class="card full-width">
        <div class="card-header">
          <h2>用户流量</h2>
        </div>
        <div class="card-body">
          <div class="user-table-wrap">
          <table class="user-table" id="userTable">
            <thead>
              <tr>
                <th>用户</th>
                <th>上行</th>
                <th>下行</th>
                <th>当期流量</th>
                <th>历史总流量</th>
                <th>占比</th>
                <th>详情</th>
              </tr>
            </thead>
            <tbody id="userBody">
              <tr><td colspan="7" class="loading">加载中</td></tr>
            </tbody>
          </table>
          </div>
        </div>
      </div>

      <!-- Inbounds -->
      <div class="card">
        <div class="card-header">
          <h2>入站统计</h2>
        </div>
        <div class="card-body">
          <div class="tag-list" id="inboundList">
            <div class="loading">加载中</div>
          </div>
        </div>
      </div>

      <!-- Outbounds -->
      <div class="card">
        <div class="card-header">
          <h2>出站统计</h2>
        </div>
        <div class="card-body">
          <div class="tag-list" id="outboundList">
            <div class="loading">加载中</div>
          </div>
        </div>
      </div>

      <!-- System -->
      <div class="card full-width">
        <div class="card-header">
          <h2>系统状态</h2>
        </div>
        <div class="card-body">
          <div class="sys-grid" id="sysGrid">
            <div class="loading">加载中</div>
          </div>
        </div>
      </div>

      <!-- Host System Info -->
      <div class="card full-width">
        <div class="card-header">
          <h2>主机信息</h2>
          <button class="btn btn-primary" onclick="fetchSysInfo()">手动刷新</button>
        </div>
        <div class="card-body">
          <div class="sys-grid" id="hostGrid">
            <div class="loading">加载中</div>
          </div>
          <div id="hostExtra" style="margin-top:16px"></div>
        </div>
      </div>
    </div>

    <!-- Network Check -->
    <div class="card full-width" style="margin-top:24px">
      <div class="card-header">
        <h2>网络检测</h2>
        <button class="btn btn-primary" id="pingBtn" onclick="runPing()">开始检测</button>
      </div>
      <div class="card-body">
        <div class="ping-grid" id="pingGrid">
          <div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:20px">点击「开始检测」测试网络连通性</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Cycle Modal -->
  <div class="modal-overlay" id="cycleModal" onclick="if(event.target===this)closeCycleModal()">
    <div class="modal-content" style="max-width:400px">
      <div class="card-header">
        <h2 id="cycleModalTitle">设置流量周期</h2>
        <button class="btn" onclick="closeCycleModal()">✕</button>
      </div>
      <div class="card-body">
        <div style="margin-bottom:16px">
          <label style="font-size:13px;color:var(--text-muted);display:block;margin-bottom:8px">每月流量重置日期 (1-31)。设置为 0 表示不自动重置。</label>
          <input type="number" id="cycleDayInput" min="0" max="31" value="0" class="form-input">
        </div>
        <div style="text-align:right">
          <button class="btn btn-primary" onclick="saveCycle()">保存设置</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Daily Traffic Modal -->
  <div class="modal-overlay" id="dailyModal" onclick="if(event.target===this)closeDailyModal()">
    <div class="modal-content">
      <div class="card-header">
        <h2 id="dailyModalTitle">每日流量分析</h2>
        <button class="btn" onclick="closeDailyModal()">✕</button>
      </div>
      <div class="card-body">
        <div class="tabs-bar" id="dailyTabs" style="margin-bottom: 16px;">
          <button class="tab-btn active" onclick="switchDailyDays(7)">7天</button>
          <button class="tab-btn" onclick="switchDailyDays(30)">30天</button>
          <button class="tab-btn" onclick="switchDailyDays(90)">90天</button>
        </div>
        <div class="daily-summary" id="dailySummary" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px;"></div>
        <div class="chart-container" style="width: 100%; height: 260px; margin-bottom: 20px;">
          <canvas class="chart-canvas" id="dailyChart" style="width: 100%; height: 100%;"></canvas>
        </div>
        <div class="user-table-wrap" style="max-height:300px;overflow-y:auto">
          <table class="user-table">
            <thead>
              <tr>
                <th>日期</th>
                <th>上行</th>
                <th>下行</th>
                <th>总计</th>
              </tr>
            </thead>
            <tbody id="dailyTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/utils.js"></script>
  <script src="/js/chart.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/modal.js"></script>
  <script src="/js/ws.js"></script>
</body>
</html>
