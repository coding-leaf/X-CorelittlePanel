<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
  <title>登录 - Xray Panel</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }
    .logo {
      width: 64px; height: 64px;
      margin: 0 auto 20px;
      background: var(--accent-blue);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: white;
      box-shadow: 0 8px 24px rgba(0, 122, 255, 0.3);
    }
    .error {
      color: var(--accent-red);
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="card" style="padding:40px 32px">
      <div class="logo">X</div>
      <h2 style="text-align:center;margin-bottom:8px;font-size:24px;font-weight:700">安全登录</h2>
      <p style="text-align:center;color:var(--text-muted);font-size:14px;margin-bottom:32px">请输入管理密码以访问面板</p>
      
      <div class="error" id="errorMsg"></div>
      
      <form id="loginForm" onsubmit="doLogin(event)">
        <div style="margin-bottom:24px">
          <input type="password" id="password" class="form-input" placeholder="密码" required style="padding:14px 16px;font-size:16px;">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:16px;font-weight:600" id="loginBtn">登 录</button>
      </form>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
